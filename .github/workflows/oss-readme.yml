name: Sync open-source counts to README

on:
  schedule:
    - cron: "35 6 * * *"   # daily, just after the site's data refresh
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: oss-readme
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync README from live oss.json
        run: node scripts/update-readme-oss.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync open-source counts"
          git push
